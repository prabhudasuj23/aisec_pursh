apiVersion: apps/v1
kind: Deployment
metadata:
  name: aisec
  labels:
    app: aisec
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aisec
  template:
    metadata:
      labels:
        app: aisec
    spec:
      # GHCR packages are public by default; add imagePullSecrets if private
      containers:
        - name: aisec
          # CD pipeline updates this tag via: sed -i 's|image: .*|image: ...:TAG|'
          image: ghcr.io/prabhudasuj23/aisec:REPLACE_IMAGE
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aisec-secrets
                  key: supabase-url
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: aisec-secrets
                  key: supabase-anon-key
            - name: SUPABASE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aisec-secrets
                  key: supabase-jwt-secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aisec-secrets
                  key: database-url
