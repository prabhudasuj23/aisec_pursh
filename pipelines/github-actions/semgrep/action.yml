name: "AISec — Semgrep SAST"
description: >
  Runs Semgrep against the target repository and outputs a SARIF file.
  Part of the AISec scanner composite action library.
  Implemented in Phase 2.

inputs:
  target-dir:
    description: "Directory to scan. Defaults to repo root."
    required: false
    default: "."
  severity-threshold:
    description: "Minimum severity to report: INFO, WARNING, ERROR."
    required: false
    default: "WARNING"
  sarif-output:
    description: "Path for the SARIF output file."
    required: false
    default: "semgrep-results.sarif"

outputs:
  sarif-file:
    description: "Path to the generated SARIF file."
    value: ${{ inputs.sarif-output }}

