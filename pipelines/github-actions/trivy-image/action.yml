name: "AISec — Trivy Container Scan"
description: >
  Runs Trivy against a container image to find OS + library vulnerabilities.
  Pre-push gate: fails the build on CRITICAL findings by default.
  Output: SARIF uploaded to GitHub Security tab.

inputs:
  image-ref:
    description: "Image reference to scan (e.g. myapp:latest or ghcr.io/org/app:sha)."
    required: true
  severity:
    description: "Severities to report."
    required: false
    default: "CRITICAL,HIGH"
  sarif-output:
    description: "Path for SARIF output."
    required: false
    default: "trivy-image-results.sarif"
  exit-code:
    description: "Exit code when vulnerabilities found (0=pass, 1=fail)."
    required: false
    default: "1"
  ignore-unfixed:
    description: "Ignore vulnerabilities with no available fix."
    required: false
    default: "true"

outputs:
  sarif-file:
    value: ${{ inputs.sarif-output }}

runs:
  using: "composite"
  steps:
    - name: Run Trivy image scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: "image"
        image-ref: ${{ inputs.image-ref }}
        format: "sarif"
        output: ${{ inputs.sarif-output }}
        severity: ${{ inputs.severity }}
        exit-code: ${{ inputs.exit-code }}
        ignore-unfixed: ${{ inputs.ignore-unfixed }}

    - name: Upload SARIF to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.sarif-output }}
        category: trivy-image
      continue-on-error: true
