# Gitleaks configuration — AISec + Pursh monorepo
# Extends the default ruleset with project-specific patterns.

[extend]
useDefault = true

# ── Custom rules ────────────────────────────────────────────────────────────────

[[rules]]
id = "supabase-service-role-key"
description = "Supabase service role key (long-lived, high privilege)"
regex = '''eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.[A-Za-z0-9_-]{50,}\.[A-Za-z0-9_-]{43}'''
tags = ["supabase", "jwt", "high-privilege"]
severity = "critical"

[[rules]]
id = "supabase-url"
description = "Hardcoded Supabase project URL"
regex = '''https://[a-z]{20}\.supabase\.co'''
tags = ["supabase", "url"]
severity = "warning"

[[rules]]
id = "aws-aisec-access-key"
description = "AWS access key — should never appear; use OIDC"
regex = '''AKIA[0-9A-Z]{16}'''
tags = ["aws", "oidc-violation"]
severity = "critical"

[[rules]]
id = "deepseek-api-key"
description = "DeepSeek API key pattern"
regex = '''sk-[a-zA-Z0-9]{48}'''
tags = ["deepseek", "llm"]
severity = "critical"

[[rules]]
id = "postgres-dsn-with-password"
description = "Postgres DSN containing a password"
regex = '''postgres(?:ql)?://[^:]+:[^@]{6,}@'''
tags = ["database", "credentials"]
severity = "critical"

# ── Allowlist — known safe patterns ────────────────────────────────────────────

[allowlist]
description = "Known-safe entries. Each requires a justification comment."
regexTarget = "match"
regexes = [
  # Test/example Supabase URLs in docs and .env.example files
  '''https://your-project\.supabase\.co''',
  # Placeholder values in .env.example
  '''your[-_]supabase[-_](url|key|anon|service)''',
  # Placeholder AWS region/account in Terraform examples
  '''123456789012''',
  # JWT examples in docs (recognizable by example.com issuer)
  '''example\.com/auth/v1''',
]

paths = [
  # Seed scripts use synthetic credentials explicitly marked
  "pursh/seed/",
  # Example env files — all values are placeholders
  "pursh/backend/.env.example",
  "pursh/frontend/.env.example",
  # .env.local files are gitignored dev-only files, never committed
  "pursh/frontend/.env.local",
  "pursh/backend/.env.local",
]
