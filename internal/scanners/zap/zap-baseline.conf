# ZAP Baseline scan configuration — AISec + Pursh monorepo
#
# Format: RULE_ID  WARN/IGNORE/FAIL  "Optional reason"
#
# WARN  = flag as warning in report, do not fail build
# IGNORE= skip this rule entirely (known FP or N/A)
# FAIL  = fail the build if this rule fires
#
# How to tune:
#   Run ZAP once, review zap.sarif, identify FPs or accepted risks,
#   add them here with IGNORE + reason comment, open a PR for security review.
#   Any rule not listed defaults to WARN.

# ── Alerts that are expected for the AISec /healthz endpoint ────────────────

# X-Content-Type-Options missing — FastAPI does not set this by default; low risk
# on a JSON-only API with no file downloads
10021 IGNORE "X-Content-Type-Options: FastAPI JSON API, no sniffing risk"

# Server leaks version via X-Powered-By — not applicable (uvicorn does not set this)
10036 IGNORE "X-Powered-By not set by uvicorn"

# Missing Anti-clickjacking header — JSON API, no HTML frames possible
10020 IGNORE "X-Frame-Options: JSON-only API, not embeddable"

# CSP not set — JSON API, no HTML rendering
10038 IGNORE "Content-Security-Policy: JSON API, no HTML"

# Strict-Transport-Security missing — expected in CI (plain HTTP); enforced at ALB in prod
10035 WARN "HSTS: add at ALB/CDN layer in production"

# ── Rules that MUST fail the build ───────────────────────────────────────────

# SQL Injection — never acceptable
40018 FAIL "SQL Injection: must fix before merge"

# Remote File Inclusion — never acceptable
7 FAIL "RFI: must fix before merge"

# Server Side Request Forgery — never acceptable
40046 FAIL "SSRF: must fix before merge"

# Path Traversal — never acceptable
6 FAIL "Path Traversal: must fix before merge"

# Cross-Site Scripting (Reflected) — never acceptable
40012 FAIL "XSS Reflected: must fix before merge"

# Remote OS Command Injection — never acceptable
90020 FAIL "OS Command Injection: must fix before merge"
