name: "AISec — Semgrep SAST"
description: >
  Runs Semgrep CE against the target directory and outputs SARIF.
  Findings are posted as PR inline comments via reviewdog.
  Critical/High findings gate the PR merge (configurable via severity-threshold).

inputs:
  target-dir:
    description: "Directory to scan."
    required: false
    default: "."
  severity-threshold:
    description: "Minimum severity to fail the check: INFO, WARNING, ERROR."
    required: false
    default: "ERROR"
  sarif-output:
    description: "Path for the SARIF output file."
    required: false
    default: "semgrep-results.sarif"
  rules:
    description: "Semgrep rule packs (space-separated)."
    required: false
    default: "p/python p/javascript p/security-audit p/owasp-top-ten p/secrets"

outputs:
  sarif-file:
    description: "Path to the generated SARIF file."
    value: ${{ inputs.sarif-output }}
  finding-count:
    description: "Total number of findings."
    value: ${{ steps.count.outputs.count }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Semgrep
      shell: bash
      run: pip install semgrep

    - name: Run Semgrep
      shell: bash
      run: |
        semgrep \
          --config ${{ inputs.rules }} \
          --sarif \
          --output ${{ inputs.sarif-output }} \
          --error \
          --timeout 300 \
          ${{ inputs.target-dir }} || true
        echo "Semgrep scan complete."

    - name: Count findings
      id: count
      shell: bash
      run: |
        COUNT=$(python3 -c "
        import json, sys
        try:
            data = json.load(open('${{ inputs.sarif-output }}'))
            total = sum(len(r.get('results', [])) for r in data.get('runs', []))
            print(total)
        except Exception:
            print(0)
        ")
        echo "count=$COUNT" >> $GITHUB_OUTPUT
        echo "Semgrep findings: $COUNT"

    - name: Upload SARIF to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.sarif-output }}
        category: semgrep
      continue-on-error: true

    - name: Post PR review comments via reviewdog
      if: github.event_name == 'pull_request'
      uses: reviewdog/action-suggester@v1
      with:
        tool_name: semgrep
        filter_mode: added
        fail_on_error: false
      continue-on-error: true
