name: "AISec — Gitleaks Secrets Scan"
description: >
  Runs Gitleaks against the repository to detect leaked secrets.
  Supports PR diff scan (fast) and full-history scan (scheduled).
  Uses custom rules from scanners/gitleaks/.gitleaks.toml.

inputs:
  scan-type:
    description: "detect (current state) or protect (staged changes) or git (full history)."
    required: false
    default: "detect"
  source:
    description: "Path to scan."
    required: false
    default: "."
  config-path:
    description: "Path to .gitleaks.toml config."
    required: false
    default: "scanners/gitleaks/.gitleaks.toml"
  sarif-output:
    description: "Path for SARIF output."
    required: false
    default: "gitleaks-results.sarif"
  fail-on-leak:
    description: "Exit 1 if leaks found (true/false)."
    required: false
    default: "true"

outputs:
  sarif-file:
    value: ${{ inputs.sarif-output }}

runs:
  using: "composite"
  steps:
    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2
      with:
        args: >-
          ${{ inputs.scan-type }}
          --source "${{ inputs.source }}"
          --config "${{ inputs.config-path }}"
          --report-format sarif
          --report-path "${{ inputs.sarif-output }}"
          ${{ inputs.fail-on-leak == 'true' && '' || '--exit-code 0' }}
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}

    - name: Upload SARIF to GitHub Security
      if: always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.sarif-output }}
        category: gitleaks
      continue-on-error: true
