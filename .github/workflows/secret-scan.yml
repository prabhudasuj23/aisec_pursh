name: Secret Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Full history scan every Sunday at 02:00 UTC
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      full_history:
        description: "Scan full git history (true) or HEAD only (false)"
        required: false
        default: "false"

permissions:
  contents: read
  security-events: write  # Required to upload SARIF to GitHub Security tab

jobs:
  gitleaks:
    name: Gitleaks — detect secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history needed for scheduled/full-history scan
          fetch-depth: ${{ github.event_name == 'schedule' && 0 || 1 }}

      - name: Run Gitleaks (PR / push — HEAD only)
        if: github.event_name != 'schedule'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # required for org repos
        with:
          args: detect --source . --log-opts="HEAD^..HEAD" --exit-code=1

      - name: Run Gitleaks (scheduled — full history)
        if: github.event_name == 'schedule' || inputs.full_history == 'true'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          args: detect --source . --exit-code=1

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: gitleaks
        continue-on-error: true  # SARIF upload failure should not block the job
