name: SCA — Trivy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * 1"   # Weekly full scan Monday 04:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  trivy-pursh:
    name: Trivy SCA — Pursh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Trivy SCA on Pursh
        uses: ./.github/actions/trivy-fs
        with:
          target-dir: pursh/
          sarif-output: trivy-pursh.sarif
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-pursh-sarif
          path: trivy-pursh.sarif
          retention-days: 30

  trivy-aisec:
    name: Trivy SCA — AISec (dogfooding)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Trivy SCA on AISec
        uses: ./.github/actions/trivy-fs
        with:
          target-dir: internal/aisec/
          sarif-output: trivy-aisec.sarif
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-aisec-sarif
          path: trivy-aisec.sarif
          retention-days: 30
