name: CI — AISec + Pursh

# Translated from the DevSecOps Real-World Projects playbook:
#   Checkout → Test + Coverage → SCA Gate → SAST Gate → Secrets Gate
#   → Build Docker → Image Scan Gate → Smoke Test → (CD trigger deferred to Phase 5)
#
# Gate policy: FAIL on CRITICAL severity / SAST ERROR-level findings only.
# High/Medium are uploaded as SARIF artefacts for review but do not block.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write   # SARIF upload to GitHub Security tab
  id-token: write          # GitHub OIDC → AWS (future)
  packages: write          # push to GHCR

# Cancel in-progress runs for the same ref (saves minutes on force-pushes)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Stage 1 — Build + Unit Tests + Coverage
  # Playbook equivalent: "Build & Unit Tests" + "Code Coverage (JaCoCo)"
  # ────────────────────────────────────────────────────────────────────────────
  test-and-coverage:
    name: "Stage 1 — Tests + Coverage"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install AISec dependencies
        run: pip install -r internal/aisec/requirements.txt

      - name: Run AISec tests with coverage
        run: |
          cd internal/aisec
          python -m pytest app/tests/ -v --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder
          SUPABASE_JWT_SECRET: placeholder-32-chars-minimum-here
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test

      - name: Install Pursh backend dependencies
        run: pip install -r pursh/backend/requirements.txt

      - name: Run Pursh backend tests
        run: |
          cd pursh/backend
          python -m pytest tests/ -v --tb=short
        env:
          PURSH_SUPABASE_URL: https://placeholder.supabase.co
          PURSH_SUPABASE_ANON_KEY: placeholder
          PURSH_SUPABASE_SERVICE_ROLE_KEY: placeholder
          PURSH_DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aisec-coverage
          path: internal/aisec/coverage.xml
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────────
  # Stage 2 — SCA: Trivy filesystem scan
  # Playbook equivalent: "SCA - Dependency Check (OWASP)"
  # Gate: fail on CRITICAL CVEs
  # ────────────────────────────────────────────────────────────────────────────
  sca-trivy:
    name: "Stage 2 — SCA (Trivy)"
    runs-on: ubuntu-latest
    needs: test-and-coverage
    steps:
      - uses: actions/checkout@v4

      - name: Trivy SCA — AISec (gated on CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: internal/aisec/
          format: sarif
          output: trivy-aisec-sca.sarif
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload AISec SCA SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-aisec-sca.sarif
          category: trivy-aisec-sca

      - name: Trivy SCA — Pursh (gated on CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: pursh/
          format: sarif
          output: trivy-pursh-sca.sarif
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Pursh SCA SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-pursh-sca.sarif
          category: trivy-pursh-sca

      - name: Upload SARIF artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-sarif
          path: "*.sarif"
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────────
  # Stage 3 — SAST: Semgrep
  # Playbook equivalent: "SonarQube Scan" + "Quality Gate"
  # Gate: fail on ERROR-level Semgrep findings (critical severity rules)
  # ────────────────────────────────────────────────────────────────────────────
  sast-semgrep:
    name: "Stage 3 — SAST (Semgrep)"
    runs-on: ubuntu-latest
    needs: test-and-coverage
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: pip install semgrep

      - name: Semgrep SAST — Pursh (scan target)
        run: |
          semgrep \
            --config p/python \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/secrets \
            --config p/sql-injection \
            --sarif \
            --output semgrep-pursh.sarif \
            --error \
            --timeout 300 \
            pursh/ || EXIT=$?
          # Exit 0 = no findings, 1 = findings, anything else = error
          if [ "${EXIT:-0}" -gt 1 ]; then exit "${EXIT}"; fi

      - name: Semgrep SAST — AISec (dogfooding)
        run: |
          semgrep \
            --config p/python \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --sarif \
            --output semgrep-aisec.sarif \
            --error \
            --timeout 300 \
            internal/aisec/ || EXIT=$?
          if [ "${EXIT:-0}" -gt 1 ]; then exit "${EXIT}"; fi

      - name: Upload Semgrep SARIFs to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-pursh.sarif
          category: semgrep-pursh

      - name: Upload SARIF artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-sarif
          path: "semgrep-*.sarif"
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────────
  # Stage 4 — Secrets scan (Gitleaks)
  # Playbook equivalent: part of security gates
  # Gate: any detected secret fails the pipeline
  # ────────────────────────────────────────────────────────────────────────────
  secrets-scan:
    name: "Stage 4 — Secrets (Gitleaks)"
    runs-on: ubuntu-latest
    needs: test-and-coverage
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for historical scan

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ────────────────────────────────────────────────────────────────────────────
  # Stage 5 — IaC scan (Checkov)
  # Playbook equivalent: security gate for infrastructure
  # Gate: CRITICAL Terraform misconfigs fail the pipeline
  # ────────────────────────────────────────────────────────────────────────────
  iac-checkov:
    name: "Stage 5 — IaC (Checkov)"
    runs-on: ubuntu-latest
    needs: test-and-coverage
    steps:
      - uses: actions/checkout@v4

      - name: Checkov IaC scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: internal/infra/terraform
          framework: terraform
          output_format: sarif
          output_file_path: checkov.sarif
          soft_fail: false
          skip_check: CKV_TF_1   # registry source pinning — not applicable in lab
        continue-on-error: true   # Terraform stubs will have findings; gate after baseline

      - name: Upload Checkov SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov.sarif
          category: checkov-iac
        continue-on-error: true

  # ────────────────────────────────────────────────────────────────────────────
  # Stage 6 — Terraform validate
  # ────────────────────────────────────────────────────────────────────────────
  terraform-validate:
    name: "Stage 6 — Terraform validate"
    runs-on: ubuntu-latest
    needs: test-and-coverage
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform init + validate (aisec)
        run: |
          cd internal/infra/terraform/aisec
          terraform init -backend=false
          terraform validate

      - name: Terraform init + validate (pursh)
        run: |
          cd internal/infra/terraform/pursh
          terraform init -backend=false
          terraform validate

      - name: Terraform fmt check
        run: terraform fmt -check -recursive internal/infra/

  # ────────────────────────────────────────────────────────────────────────────
  # Stage 7 — Build Docker images + push to GHCR
  # Playbook equivalent: "Build Docker Image" + push to registry
  # Only runs after all security gates pass
  # ────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: "Stage 7 — Build + Push (GHCR)"
    runs-on: ubuntu-latest
    needs: [sca-trivy, sast-semgrep, secrets-scan, iac-checkov, terraform-validate]
    outputs:
      aisec-image: ${{ steps.meta-aisec.outputs.tags }}
      pursh-image: ${{ steps.meta-pursh.outputs.tags }}
      aisec-digest: ${{ steps.push-aisec.outputs.digest }}
      pursh-digest: ${{ steps.push-pursh.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── AISec image ──────────────────────────────────────────────────────────
      - name: Docker metadata — AISec
        id: meta-aisec
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/aisec
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build + push AISec image
        id: push-aisec
        uses: docker/build-push-action@v5
        with:
          context: internal/aisec/
          file: internal/aisec/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta-aisec.outputs.tags }}
          labels: ${{ steps.meta-aisec.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      # ── Pursh backend image ──────────────────────────────────────────────────
      - name: Docker metadata — Pursh backend
        id: meta-pursh
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/pursh-backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build + push Pursh backend image
        id: push-pursh
        uses: docker/build-push-action@v5
        with:
          context: pursh/backend/
          file: pursh/backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta-pursh.outputs.tags }}
          labels: ${{ steps.meta-pursh.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  # ────────────────────────────────────────────────────────────────────────────
  # Stage 8 — Trivy image scan (post-build security gate)
  # Playbook equivalent: "Image Scan (Trivy)"
  # Gate: CRITICAL CVEs in the final image fail the pipeline
  # ────────────────────────────────────────────────────────────────────────────
  image-scan:
    name: "Stage 8 — Image Scan (Trivy)"
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Re-build locally for scanning (PR builds aren't pushed to registry)
      - name: Build AISec image for scan
        uses: docker/build-push-action@v5
        with:
          context: internal/aisec/
          file: internal/aisec/Dockerfile
          push: false
          load: true
          tags: aisec:scan
          cache-from: type=gha

      - name: Build Pursh image for scan
        uses: docker/build-push-action@v5
        with:
          context: pursh/backend/
          file: pursh/backend/Dockerfile
          push: false
          load: true
          tags: pursh-backend:scan
          cache-from: type=gha

      - name: Trivy image scan — AISec (CRITICAL gate)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: aisec:scan
          format: sarif
          output: trivy-aisec-image.sarif
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Trivy image scan — Pursh backend (CRITICAL gate)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: pursh-backend:scan
          format: sarif
          output: trivy-pursh-image.sarif
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload image scan SARIFs
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-aisec-image.sarif
          category: trivy-aisec-image
        continue-on-error: true

      - name: Upload SARIF artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: image-scan-sarif
          path: "trivy-*-image.sarif"
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────────
  # Stage 9 — Smoke test
  # Playbook equivalent: "Smoke Test" (curl /healthz after docker run)
  # Confirms the built image actually starts and serves traffic
  # ────────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: "Stage 9 — Smoke Test"
    runs-on: ubuntu-latest
    needs: image-scan
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build AISec image for smoke test
        uses: docker/build-push-action@v5
        with:
          context: internal/aisec/
          file: internal/aisec/Dockerfile
          push: false
          load: true
          tags: aisec:smoke
          cache-from: type=gha

      - name: Build Pursh backend image for smoke test
        uses: docker/build-push-action@v5
        with:
          context: pursh/backend/
          file: pursh/backend/Dockerfile
          push: false
          load: true
          tags: pursh-backend:smoke
          cache-from: type=gha

      - name: Smoke test — AISec (/healthz on port 8000)
        run: ./internal/demo/smoke-test.sh aisec:smoke 8000

      - name: Smoke test — Pursh backend (/healthz on port 8001)
        run: ./internal/demo/smoke-test.sh pursh-backend:smoke 8001
