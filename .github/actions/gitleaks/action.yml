name: "AISec — Gitleaks Secrets Scan"
description: "Delegates to pipelines/github-actions/gitleaks/action.yml — source of truth."

inputs:
  scan-type:
    required: false
    default: "detect"
  source:
    required: false
    default: "."
  config-path:
    required: false
    default: "scanners/gitleaks/.gitleaks.toml"
  sarif-output:
    required: false
    default: "gitleaks-results.sarif"
  fail-on-leak:
    required: false
    default: "true"

outputs:
  sarif-file:
    value: ${{ inputs.sarif-output }}

runs:
  using: "composite"
  steps:
    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2
      with:
        args: >-
          ${{ inputs.scan-type }}
          --source "${{ inputs.source }}"
          --config "${{ inputs.config-path }}"
          --report-format sarif
          --report-path "${{ inputs.sarif-output }}"
          ${{ inputs.fail-on-leak == 'true' && '' || '--exit-code 0' }}
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}

    - name: Upload SARIF to GitHub Security
      if: always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.sarif-output }}
        category: gitleaks
      continue-on-error: true
