name: "AISec — Trivy Container Scan"
description: "Delegates to pipelines/github-actions/trivy-image/action.yml — source of truth."

inputs:
  image-ref:
    required: true
  severity:
    required: false
    default: "CRITICAL,HIGH"
  sarif-output:
    required: false
    default: "trivy-image-results.sarif"
  exit-code:
    required: false
    default: "1"
  ignore-unfixed:
    required: false
    default: "true"

outputs:
  sarif-file:
    value: ${{ inputs.sarif-output }}

runs:
  using: "composite"
  steps:
    - name: Run Trivy image scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: "image"
        image-ref: ${{ inputs.image-ref }}
        format: "sarif"
        output: ${{ inputs.sarif-output }}
        severity: ${{ inputs.severity }}
        exit-code: ${{ inputs.exit-code }}
        ignore-unfixed: ${{ inputs.ignore-unfixed }}

    - name: Upload SARIF to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.sarif-output }}
        category: trivy-image
      continue-on-error: true
